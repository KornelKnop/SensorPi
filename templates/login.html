<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SensorPi — Logowanie</title>
    <link rel="stylesheet" href="static/css/fontello.css" />
    <style>
      :root {
        --bg0: #0b1220;
        --text0: rgba(255, 255, 255, 0.92);
        --text1: rgba(255, 255, 255, 0.72);
        --text2: rgba(255, 255, 255, 0.55);
        --card: rgba(255, 255, 255, 0.04);
        --border: rgba(255, 255, 255, 0.07);
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        --radius: 16px;
        --accent: #7aa2ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--text0);
        background:
          radial-gradient(1200px 900px at 15% 0%, rgba(122, 162, 255, 0.20), transparent 55%),
          radial-gradient(900px 700px at 80% 20%, rgba(53, 208, 127, 0.12), transparent 55%),
          linear-gradient(180deg, #070b14, var(--bg0));
        display: grid;
        place-items: center;
        padding: 22px;
      }

      .card {
        width: min(520px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 18px;
      }

      .title {
        font-weight: 800;
        font-size: 20px;
        letter-spacing: 0.2px;
      }

      .subtitle {
        margin-top: 6px;
        color: var(--text2);
        font-size: 12px;
      }

      form {
        margin-top: 14px;
        display: grid;
        gap: 10px;
      }

      label {
        display: block;
        color: var(--text1);
        font-size: 12px;
        margin-bottom: 6px;
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.10);
        background: rgba(0, 0, 0, 0.18);
        color: var(--text0);
        outline: none;
      }

      .row {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        margin-top: 4px;
      }

      .btn {
        cursor: pointer;
        border-radius: 12px;
        border: 1px solid rgba(122, 162, 255, 0.35);
        background: rgba(122, 162, 255, 0.15);
        color: rgba(122, 162, 255, 1);
        font-weight: 800;
        padding: 10px 12px;
      }

      .btn:hover {
        background: rgba(122, 162, 255, 0.22);
      }

      .link {
        color: rgba(255, 255, 255, 0.75);
        font-size: 12px;
        text-decoration: none;
      }

      .link:hover {
        color: rgba(255, 255, 255, 0.92);
      }

      .remember {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        color: var(--text1);
        font-size: 12px;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="title">SensorPi</div>
      <div class="subtitle">Zaloguj się, aby przejść do dashboardu</div>

      <form method="post" action="/login">
        {{ form.hidden_tag() }}

        <div>
          <label for="username">Login</label>
          {{ form.username(id="username") }}
        </div>

        <div>
          <label for="password">Hasło</label>
          {{ form.password(id="password") }}
        </div>

        <div class="row">
          <label class="remember">
            {{ form.remember() }}
            <span>Zapamiętaj mnie</span>
          </label>

          {{ form.submit(class_="btn") }}
        </div>

        <div class="row">
          <a class="link" href="/signup">Nie masz konta? Zarejestruj się</a>
          <a class="link" href="/dashboard">Przejdź do dashboardu</a>
        </div>
      </form>
    </div>
  </body>
</html>
